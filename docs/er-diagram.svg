<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#64748B"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .entity-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .field { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #1E293B; }
      .field-muted { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .field-key { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #0F766E; }
      .label { font: 700 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .cardinality { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="url(#bg)"/>
  <text x="60" y="70" class="title">Demo Credit Wallet API ER Diagram</text>
  <text x="60" y="102" class="subtitle">Logical data model for users, wallets, and transaction ledger records</text>

  <g filter="url(#shadow)">
    <rect x="70" y="180" width="280" height="210" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="70" y="180" width="280" height="58" rx="22" fill="url(#header)"/>
    <rect x="70" y="216" width="280" height="22" fill="url(#header)"/>
    <text x="102" y="218" class="entity-title">users</text>
    <text x="102" y="275" class="field-key">PK  id</text>
    <text x="102" y="308" class="field">first_name</text>
    <text x="102" y="341" class="field">last_name</text>
    <text x="102" y="374" class="field">email, phone</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="455" y="180" width="290" height="210" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="455" y="180" width="290" height="58" rx="22" fill="url(#header)"/>
    <rect x="455" y="216" width="290" height="22" fill="url(#header)"/>
    <text x="487" y="218" class="entity-title">wallets</text>
    <text x="487" y="275" class="field-key">PK  id</text>
    <text x="487" y="308" class="field-key">FK  user_id → users.id</text>
    <text x="487" y="341" class="field">balance DECIMAL(19,4)</text>
    <text x="487" y="374" class="field">currency, timestamps</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="120" width="300" height="420" rx="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <rect x="840" y="120" width="300" height="58" rx="22" fill="url(#header)"/>
    <rect x="840" y="156" width="300" height="22" fill="url(#header)"/>
    <text x="872" y="158" class="entity-title">transactions</text>
    <text x="872" y="215" class="field-key">PK  id</text>
    <text x="872" y="248" class="field">reference</text>
    <text x="872" y="281" class="field-key">FK  wallet_id → wallets.id</text>
    <text x="872" y="314" class="field-key">FK  source_wallet_id → wallets.id</text>
    <text x="872" y="347" class="field-key">FK  destination_wallet_id → wallets.id</text>
    <text x="872" y="380" class="field">type, status</text>
    <text x="872" y="413" class="field">amount DECIMAL(19,4)</text>
    <text x="872" y="446" class="field">balance_before</text>
    <text x="872" y="479" class="field">balance_after</text>
    <text x="872" y="512" class="field">narration, metadata</text>
  </g>

  <line x1="350" y1="285" x2="455" y2="285" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="375" y="258" class="cardinality">1 : 1</text>
  <text x="367" y="316" class="label">one user owns one wallet</text>

  <line x1="745" y1="250" x2="840" y2="210" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="758" y="212" class="cardinality">1 : many</text>
  <text x="718" y="178" class="label">wallet ledger entries</text>

  <line x1="745" y1="290" x2="840" y2="330" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="752" y="350" class="cardinality">1 : many</text>
  <text x="685" y="382" class="label">wallet as transfer source</text>

  <line x1="745" y1="330" x2="840" y2="450" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="755" y="450" class="cardinality">1 : many</text>
  <text x="660" y="486" class="label">wallet as transfer destination</text>

  <g>
    <rect x="70" y="610" width="1070" height="92" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="100" y="648" class="label">Relationship summary</text>
    <text x="100" y="680" class="field-muted">users 1 ─── 1 wallets   |   wallets 1 ─── many transactions   |   wallets 1 ─── many source transactions   |   wallets 1 ─── many destination transactions</text>
  </g>
</svg>
